<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useCallback, useRef, useEffect } = React;

    const getApiKey = () => localStorage.getItem("anesflow_api_key") || "";
    let ANTHROPIC_API_KEY = getApiKey();

    function ApiKeyGate({ onSave }) {
      const [val, setVal] = useState("");
      const [err, setErr] = useState("");
      const submit = () => {
        const trimmed = val.trim();
        if (!trimmed.startsWith("sk-ant-")) { setErr("Key should start with sk-ant-"); return; }
        localStorage.setItem("anesflow_api_key", trimmed);
        ANTHROPIC_API_KEY = trimmed;
        onSave();
      };
      return (
        <div style={{minHeight:"100vh",background:"#080c14",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#0d1320",border:"1px solid rgba(0,212,255,0.25)",borderRadius:16,padding:32,maxWidth:440,width:"100%"}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:700,color:"#e4eaf8",marginBottom:6}}>🫁 AnesFlow</div>
            <div style={{fontFamily:"monospace",fontSize:11,color:"#4a5a7a",marginBottom:24,letterSpacing:1}}>CA1 Anesthesiology Suite — Requires Anthropic API Key</div>
            <div style={{fontSize:12,color:"#8fa3cc",marginBottom:8}}>Anthropic API Key</div>
            <input type="password" placeholder="sk-ant-api03-..." value={val}
              onChange={e=>{setVal(e.target.value);setErr("");}}
              onKeyDown={e=>e.key==="Enter"&&submit()}
              style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,color:"#e4eaf8",fontFamily:"monospace",fontSize:13,padding:"10px 12px",outline:"none",boxSizing:"border-box",marginBottom:err?8:16}}/>
            {err && <div style={{fontSize:11,color:"#f87171",marginBottom:12}}>{err}</div>}
            <button onClick={submit} style={{width:"100%",padding:12,background:"linear-gradient(135deg,#00d4ff,#4f46e5)",border:"none",borderRadius:8,color:"white",fontFamily:"sans-serif",fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:20}}>
              Save Key &amp; Launch App
            </button>
            <div style={{background:"rgba(245,166,35,0.08)",border:"1px solid rgba(245,166,35,0.25)",borderRadius:8,padding:12}}>
              <div style={{fontSize:11,color:"#f5a623",fontWeight:600,marginBottom:6}}>⚠ How to get your API key</div>
              <div style={{fontSize:11,color:"#8fa3cc",lineHeight:1.6}}>
                1. Go to <span style={{color:"#00d4ff"}}>console.anthropic.com</span><br/>
                2. Sign in → API Keys → Create Key<br/>
                3. Paste the full sk-ant-... key above
              </div>
            </div>
            <div style={{marginTop:12,fontSize:10,color:"#4a5a7a",lineHeight:1.5,fontFamily:"monospace"}}>Key stored locally on this device only.</div>
          </div>
        </div>
      );
    }

const FONTS = `@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Figtree:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap');`;

const CSS = `
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--bg1:#0d1320;--bg2:#111827;--bg3:#1a2235;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e4eaf8;--text2:#8fa3cc;--text3:#4a5a7a;
  --cyan:#00d4ff;--cyan2:rgba(0,212,255,0.15);--cyan3:rgba(0,212,255,0.06);
  --amber:#f5a623;--amber2:rgba(245,166,35,0.15);
  --green:#34d399;--green2:rgba(52,211,153,0.15);
  --red:#f87171;--red2:rgba(248,113,113,0.15);
  --purple:#a78bfa;--purple2:rgba(167,139,250,0.15);
  --font-head:'Syne',sans-serif;--font-body:'Figtree',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --r:8px;--r2:12px;--r3:16px;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{display:flex;flex-direction:column;min-height:100vh;position:relative}
.app::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 15% 5%,rgba(0,212,255,0.055) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 85% 90%,rgba(167,139,250,0.04) 0%,transparent 60%);}

/* TOP NAV — desktop only */
.nav{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);
  background:rgba(8,12,20,0.92);backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:100;padding:0 8px;}
.nav-logo{display:flex;align-items:center;gap:10px;padding:14px 20px;border-right:1px solid var(--border);margin-right:8px;flex-shrink:0;}
.nav-logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),#4f46e5);display:flex;align-items:center;justify-content:center;font-size:16px;}
.nav-logo h1{font-family:var(--font-head);font-size:15px;font-weight:700;letter-spacing:-0.3px;white-space:nowrap;}
.nav-logo span{font-family:var(--font-mono);font-size:9px;color:var(--text3);letter-spacing:1px;display:block;margin-top:1px;}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto;padding:8px 0;}
.nav-tab{display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:var(--r);
  font-size:12.5px;font-weight:500;color:var(--text3);cursor:pointer;
  border:1px solid transparent;transition:all 0.18s;white-space:nowrap;font-family:var(--font-body);background:none;}
.nav-tab:hover{color:var(--text2);background:var(--bg3);}
.nav-tab.active{color:var(--cyan);background:var(--cyan3);border-color:rgba(0,212,255,0.25);}
.nav-tab-icon{font-size:14px;}
.nav-badge{font-family:var(--font-mono);font-size:9px;padding:2px 5px;border-radius:4px;background:var(--cyan2);color:var(--cyan);margin-left:2px;}

/* BOTTOM NAV — mobile only */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(8,12,20,0.97);backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.09);
  z-index:200;padding:6px 0;
  padding-bottom:calc(6px + env(safe-area-inset-bottom));}
.bottom-nav-inner{display:flex;align-items:stretch;justify-content:space-around;}
.bn-btn{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 8px;border-radius:10px;border:none;background:transparent;
  cursor:pointer;color:var(--text3);font-family:var(--font-body);
  min-width:58px;font-size:10px;font-weight:500;transition:all 0.15s;min-height:52px;justify-content:center;}
.bn-btn.active{color:var(--cyan);}
.bn-btn-icon{font-size:22px;line-height:1;}
.bn-badge{font-family:var(--font-mono);font-size:8px;padding:1px 4px;border-radius:3px;background:var(--cyan2);color:var(--cyan);margin-top:1px;}

/* CONTENT */
.content{flex:1;position:relative;z-index:1;}
.page{padding:28px 32px;max-width:1400px;margin:0 auto;}
.page-title{font-family:var(--font-head);font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text3);font-family:var(--font-mono);margin-bottom:24px;}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);padding:20px;}
.card-sm{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.section-head{font-family:var(--font-mono);font-size:9.5px;font-weight:500;letter-spacing:2px;
  text-transform:uppercase;color:var(--cyan);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;}
.section-head::after{content:'';flex:1;height:1px;background:rgba(0,212,255,0.15);}
input,textarea,select{width:100%;background:rgba(255,255,255,0.04);
  border:1px solid var(--border2);border-radius:var(--r);color:var(--text);
  font-family:var(--font-body);font-size:13px;padding:9px 12px;
  transition:border-color 0.18s,background 0.18s;outline:none;}
input:focus,textarea:focus,select:focus{border-color:rgba(0,212,255,0.45);background:rgba(0,212,255,0.03);}
input::placeholder,textarea::placeholder{color:var(--text3);}
textarea{resize:vertical;min-height:68px;line-height:1.55;}
select option{background:#121828;}
label.field-lbl{display:block;font-size:11px;color:var(--text3);font-weight:500;margin-bottom:5px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
.gap{margin-bottom:14px;}
.pill-wrap{display:flex;flex-wrap:wrap;gap:5px;}
.pill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;
  border:1px solid var(--border2);background:rgba(255,255,255,0.03);
  cursor:pointer;transition:all 0.15s;color:var(--text3);user-select:none;font-family:var(--font-mono);}
.pill:hover{border-color:rgba(0,212,255,0.35);color:var(--text2);}
.pill.on{background:var(--cyan2);border-color:var(--cyan);color:var(--cyan);}
.pill.amber{background:var(--amber2);border-color:var(--amber);color:var(--amber);}
.pill.green{background:var(--green2);border-color:var(--green);color:var(--green);}
.pill.red{background:var(--red2);border-color:var(--red);color:var(--red);}
.pill.purple{background:var(--purple2);border-color:var(--purple);color:var(--purple);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:10px 20px;border-radius:var(--r);font-family:var(--font-body);
  font-size:13px;font-weight:600;cursor:pointer;transition:all 0.18s;border:none;}
.btn-primary{background:linear-gradient(135deg,var(--cyan),#4f46e5);color:white;}
.btn-primary:hover{opacity:0.88;transform:translateY(-1px);}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-ghost{background:rgba(255,255,255,0.05);border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{background:rgba(255,255,255,0.09);color:var(--text);}
.btn-ghost:disabled{opacity:0.4;cursor:not-allowed;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.toggle-lbl{font-size:12px;color:var(--text2);}
.tog{width:34px;height:19px;border-radius:10px;background:rgba(255,255,255,0.1);cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0;}
.tog.on{background:rgba(0,212,255,0.55);}
.tog::after{content:'';position:absolute;width:13px;height:13px;border-radius:50%;background:white;top:3px;left:3px;transition:left 0.18s;}
.tog.on::after{left:18px;}
.dot-stream{display:inline-block;}
.dot-stream::after{content:'...';animation:dots 1.2s steps(4,end) infinite;}
@keyframes dots{0%,20%{content:''}40%{content:'.'}60%{content:'..'}80%,100%{content:'...'}}
.blink-cur{display:inline-block;width:7px;height:14px;background:var(--cyan);border-radius:2px;animation:blink .7s step-end infinite;vertical-align:middle;margin-left:2px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--font-mono);}
.badge-low{background:var(--green2);color:var(--green);border:1px solid rgba(52,211,153,0.3);}
.badge-mod{background:var(--amber2);color:var(--amber);border:1px solid rgba(245,166,35,0.3);}
.badge-high{background:var(--red2);color:var(--red);border:1px solid rgba(248,113,113,0.3);}
.badge-info{background:var(--cyan2);color:var(--cyan);border:1px solid rgba(0,212,255,0.3);}
.drug-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.drug-table th{font-family:var(--font-mono);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;font-weight:500;}
.drug-table td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.04);font-family:var(--font-mono);color:var(--text2);}
.drug-table tr:last-child td{border-bottom:none;}
.drug-table tr:hover td{background:rgba(255,255,255,0.02);}
.drug-name{color:var(--text)!important;font-weight:500;}
.drug-dose{color:var(--cyan)!important;}
.drug-range{color:var(--text3)!important;font-size:11px;}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:var(--r);border:1px solid var(--border);background:rgba(255,255,255,0.02);cursor:pointer;transition:background 0.14s;margin-bottom:6px;}
.check-item:hover{background:rgba(255,255,255,0.04);}
.check-item.done{opacity:0.45;}
.check-box{width:18px;height:18px;border-radius:4px;border:1.5px solid rgba(0,212,255,0.4);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all 0.15s;}
.check-item.done .check-box{background:rgba(0,212,255,0.3);border-color:var(--cyan);}
.check-txt{font-size:12.5px;color:var(--text2);line-height:1.45;}
.check-item.done .check-txt{text-decoration:line-through;color:var(--text3);}
.check-priority{font-size:10px;font-family:var(--font-mono);margin-top:2px;}
.plan-out{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:20px;font-family:var(--font-mono);font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;}
.risk-bar-wrap{height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;margin:6px 0;}
.risk-bar{height:100%;border-radius:3px;transition:width 0.5s ease;}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.collapsible{overflow:hidden;transition:max-height 0.3s ease;}

/* READING CARDS */
.reading-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:10px;transition:border-color 0.15s;}
.reading-card.high{border-left:3px solid var(--cyan);}
.reading-card.med{border-left:3px solid var(--amber);}
.reading-card.low{border-left:3px solid rgba(255,255,255,0.1);}
.ch-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-family:var(--font-mono);font-size:10px;background:var(--cyan2);color:var(--cyan);margin-right:8px;}
.board-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-family:var(--font-mono);font-size:9px;background:var(--purple2);color:var(--purple);border:1px solid rgba(167,139,250,0.2);margin:2px 3px 2px 0;}
.source-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-family:var(--font-mono);font-size:9px;background:rgba(255,255,255,0.04);color:var(--text3);border:1px solid var(--border);margin:2px 3px 2px 0;}

/* RESPONSIVE */
@media(max-width:768px){
  .nav{display:none!important;}
  .bottom-nav{display:block!important;}
  .content{padding-bottom:calc(68px + env(safe-area-inset-bottom));}
  .page{padding:16px 14px;}
  .page-title{font-size:18px;}
  .g2,.g3,.g4{grid-template-columns:1fr!important;}
  .preop-grid{grid-template-columns:1fr!important;}
  .or-grid{grid-template-columns:1fr!important;}
}
@media(min-width:769px){
  .bottom-nav{display:none!important;}
}
@media(max-width:900px){
  .page{padding:16px;}
}
`;

function Pills({opts=[],sel=[],onChange,multi=true}){
  const safeSel=Array.isArray(sel)?sel:[];
  const safeOpts=Array.isArray(opts)?opts:[];
  const tog=(o)=>multi?onChange(safeSel.includes(o)?safeSel.filter(x=>x!==o):[...safeSel,o]):onChange(safeSel.includes(o)?[]:[o]);
  return <div className="pill-wrap">{safeOpts.map(o=><span key={o} className={`pill${safeSel.includes(o)?" on":""}`} onClick={()=>tog(o)}>{o}</span>)}</div>;
}

// ─── DRUG DOSE CALCULATOR ────────────────────────────────────────────────────
function DrugCalc({pt}){
  const wt=parseFloat(pt.weight)||0;
  const [selCat,setSelCat]=useState("induction");
  const [ibw,setIbw]=useState(false);
  const heightCm=parseFloat(pt.height)||0;
  const sex=(pt.ageSex||"").toLowerCase().includes("f")?"f":"m";
  const ibwVal=sex==="m"?50+2.3*((heightCm/2.54)-60):45.5+2.3*((heightCm/2.54)-60);
  const effectiveWt=ibw&&ibwVal>0?Math.max(ibwVal,0):wt;
  const fmt=(n)=>n<1?n.toFixed(2):n<10?n.toFixed(1):Math.round(n);
  const cats=Object.keys(DRUG_DB);
  const catColors={induction:"var(--cyan)",paralytic:"var(--amber)",reversal:"var(--green)",opioid:"var(--purple)",vasoactive:"var(--red)",antiemetic:"var(--green)",local:"var(--amber)",maintenance:"var(--cyan)",emergency:"var(--red)"};
  return(
    <div className="page">
      <div className="page-title">Drug Dose Calculator</div>
      <div className="page-sub">// weight-based dosing · all doses calculated to patient weight</div>
      {wt===0&&<div className="card" style={{marginBottom:16,borderColor:"rgba(245,166,35,0.3)",background:"var(--amber2)"}}>
        <span style={{color:"var(--amber)",fontSize:13}}>⚠ Enter patient weight in Pre-Op Planner tab to enable auto-calculation.</span>
      </div>}
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20,flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:16,alignItems:"center",background:"var(--bg1)",border:"1px solid var(--border)",borderRadius:"var(--r)",padding:"10px 16px",flexWrap:"wrap"}}>
          <span style={{fontFamily:"var(--font-mono)",fontSize:12,color:"var(--text2)"}}>Patient:</span>
          <span style={{fontFamily:"var(--font-mono)",fontSize:13,color:"var(--text)"}}>{pt.name||"—"}</span>
          <span style={{fontFamily:"var(--font-mono)",fontSize:13,color:"var(--cyan)"}}>{wt?`${wt} kg`:"? kg"}</span>
          {ibwVal>0&&<span style={{fontFamily:"var(--font-mono)",fontSize:12,color:"var(--text3)"}}>IBW: {ibwVal.toFixed(1)} kg</span>}
        </div>
        {ibwVal>0&&<div className="toggle-row" style={{gap:8}}><span className="toggle-lbl">Use IBW</span><div className={`tog${ibw?" on":""}`} onClick={()=>setIbw(!ibw)}/></div>}
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:20}}>
        {cats.map(c=><button key={c} className={`btn${selCat===c?" btn-primary":" btn-ghost"}`}
          style={{fontSize:11,padding:"6px 14px",fontFamily:"var(--font-mono)",
            ...(selCat===c?{}:{color:catColors[c]||"var(--text2)"})}}
          onClick={()=>setSelCat(c)}>{c.toUpperCase()}</button>)}
      </div>
      <div className="card" style={{padding:0,overflow:"hidden",overflowX:"auto"}}>
        <table className="drug-table" style={{width:"100%",minWidth:520}}>
          <thead><tr><th>Drug</th><th>Dose Range</th>{wt>0&&<th>Calculated ({ibw?"IBW":"actual"} {effectiveWt}kg)</th>}<th>Route</th><th>Notes</th></tr></thead>
          <tbody>
            {(DRUG_DB[selCat]||[]).map(d=>{
              const lo=d.dose_lo*effectiveWt,hi=d.dose_hi*effectiveWt;
              const isFixed=d.dose_lo===0&&d.dose_hi===0;
              const calcStr=isFixed?"See note":d.dose_lo===d.dose_hi?`${fmt(lo)} ${d.unit.split("/")[0]}`:`${fmt(lo)} – ${fmt(hi)} ${d.unit.split("/")[0]}`;
              return(<tr key={d.name}>
                <td className="drug-name">{d.name}</td>
                <td className="drug-range">{isFixed?"Fixed":`${d.dose_lo}–${d.dose_hi} ${d.unit}`}</td>
                {wt>0&&<td className="drug-dose">{wt>0?calcStr:"—"}</td>}
                <td><span className="pill" style={{fontSize:10}}>{d.route}</span></td>
                <td style={{fontSize:11,color:"var(--text3)",maxWidth:260}}>{d.note}</td>
              </tr>);
            })}
          </tbody>
        </table>
      </div>
      <div style={{marginTop:12,fontFamily:"var(--font-mono)",fontSize:10,color:"var(--text3)"}}>⚠ Clinical decision support only. Verify all dosing with current references and attending guidance.</div>
    </div>
  );
}

// ─── RISK STRATIFIER ────────────────────────────────────────────────────────
function RiskStratifier({pt,setPt}){
  const [output,setOutput]=useState("");
  const [loading,setLoading]=useState(false);
  const [streaming,setStreaming]=useState(false);

  const apfelScore=(()=>{
    let s=0;
    if((pt.ageSex||"").toLowerCase().includes("f"))s++;
    if(!pt.smoker)s++;
    const pmhx=(pt.pmhx||"").toLowerCase();
    if(pmhx.includes("ponv")||pmhx.includes("motion sickness"))s++;
    if((pt.adjuncts||[]).some(a=>a.toLowerCase().includes("opioid")))s++;
    return s;
  })();

  const rcri=(()=>{
    let s=0;
    const pmhx=(pt.pmhx||"").toLowerCase();
    const proc=(pt.procedure||"").toLowerCase();
    if(/abdominal|thoracic|vascular|aortic|suprainguinal/i.test(proc))s++;
    const hs=["ischemic heart","coronary","cad","mi ","heart failure","chf","cerebrovascular","stroke","tia","diabetes","insulin","creatinine","renal failure","ckd"];
    hs.forEach(h=>{if(pmhx.includes(h))s++;});
    return Math.min(s,6);
  })();

  const stopbang=(()=>{
    const pmhx=(pt.pmhx||"").toLowerCase();
    let s=0;
    if(pmhx.includes("snor"))s++;
    if(pmhx.includes("tired")||pmhx.includes("fatigue"))s++;
    if(pmhx.includes("apnea")||pmhx.includes("osa")||pmhx.includes("cpap"))s+=2;
    if(parseFloat(pt.weight)>100)s++;
    const age=parseInt((pt.ageSex||"0").replace(/[^0-9]/g,""));
    if(age>50)s++;
    return Math.min(s,8);
  })();

  const rcriRisk=rcri<=0?"<1%":rcri===1?"1%":rcri===2?"7%":"≥11%";
  const rcriLabel=rcri<=0?"Low":rcri<=1?"Low":rcri===2?"Moderate":"High";
  const apfelLabel=apfelScore<=1?"Low (10-20%)":apfelScore===2?"Moderate (40%)":apfelScore===3?"High (60%)":"Very High (80%)";
  const osaRisk=stopbang>=5?"High":stopbang>=3?"Intermediate":"Low";
  const meterColor=(v,max)=>v/max<0.33?"var(--green)":v/max<0.66?"var(--amber)":"var(--red)";

  const generate=async()=>{
    setLoading(true);setOutput("");setStreaming(true);
    const prompt=`You are a senior anesthesiologist doing a rapid pre-operative risk stratification for a CA1 resident. Be direct, terse, and clinically precise.
PATIENT: ${pt.name||"Unknown"} | ${pt.ageSex||"?"} | ${pt.weight||"?"}kg
PROCEDURE: ${pt.procedure||"?"} | ${pt.caseType||"General"}
PMHx: ${pt.pmhx||"None"} | Meds: ${pt.medications||"None"}
Allergies: ${pt.nkda?"NKDA":pt.allergies||"Unknown"} | Smoker: ${pt.smoker?"Yes":"No"}
RCRI: ${rcri} (${rcriRisk}) | Apfel: ${apfelScore}/4 (${apfelLabel}) | OSA: ${osaRisk}

Generate a RAPID RISK BRIEF:
1. TOP 3-5 INTRAOPERATIVE COMPLICATIONS (specific to this patient, ranked by likelihood)
2. AIRWAY CONCERNS (specific findings, backup plan)
3. HEMODYNAMIC CONCERNS (anticipated instability, vasopressor readiness)
4. METABOLIC / COAGULATION concerns
5. EMERGENCE & POSTOP CONCERNS
6. ONE-LINE ATTENDING BRIEF

Be specific — reference actual PMHx and procedure. Flag HIGH RISK items.`;
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":getApiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,stream:true,messages:[{role:"user",content:prompt}]})});
      const reader=r.body.getReader();const dec=new TextDecoder();let buf="";
      while(true){const{done,value}=await reader.read();if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split("\n");buf=lines.pop();
        for(const l of lines){if(!l.startsWith("data: "))continue;const d=l.slice(6);if(d==="[DONE]")continue;
          try{const j=JSON.parse(d);if(j.delta?.text)setOutput(p=>p+j.delta.text);}catch{}}}
    }catch(e){setOutput("Error: "+e.message);}
    setLoading(false);setStreaming(false);
  };

  return(
    <div className="page">
      <div className="page-title">Risk Stratifier</div>
      <div className="page-sub">// pre-op risk scoring · AI complication prediction</div>

          <div style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text3)",marginTop:6}}>Major cardiac event risk: {rcriRisk}</div>
        </div>

            <span style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text3)"}}>/ 8</span>
            <span className={`badge badge-${osaRisk==="Low"?"low":osaRisk==="Intermediate"?"mod":"high"}`}>{osaRisk}</span>
          </div>
          <div className="risk-bar-wrap"><div className="risk-bar" style={{width:`${(stopbang/8)*100}%`,background:meterColor(stopbang,8)}}/></div>
          <div style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text3)",marginTop:6}}>Score estimated from PMHx inputs</div>
        </div>
      </div>
      <div className="card gap">
        <div className="section-head">Quick Flags</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {(pt.asa==="IV"||pt.asa==="V")&&<span className="pill red">ASA {pt.asa} — High Acuity</span>}
          {(pt.mallampati==="III"||pt.mallampati==="IV")&&<span className="pill red">Mallampati {pt.mallampati} — Difficult Airway</span>}
          {pt.mets==="<4"&&<span className="pill amber">Low Functional Capacity (&lt;4 METs)</span>}
          {pt.smoker&&<span className="pill amber">Active Smoker — Resp Risk ↑</span>}
          {!pt.nkda&&pt.allergies&&<span className="pill red">⚠ Allergies: {pt.allergies}</span>}
          {(pt.pmhx||"").toLowerCase().includes("osa")&&<span className="pill amber">OSA — Airway + Emergence Risk</span>}
          {(pt.pmhx||"").toLowerCase().includes("anticoag")&&<span className="pill red">Anticoagulation — Bleeding Risk</span>}
          {(pt.caseType||"").includes("Cardiac")&&<span className="pill red">High-Risk Surgery</span>}
          {apfelScore>=3&&<span className="pill amber">High PONV Risk — Triple Prophylaxis</span>}
          {!pt.name&&!pt.pmhx&&<span className="pill" style={{color:"var(--text3)"}}>Enter patient data in Pre-Op Planner to auto-populate</span>}
        </div>
      </div>
      <div className="card">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div className="section-head" style={{marginBottom:0}}>AI Complication Prediction</div>

function ORSetup({pt,setPt}){
  const [checked,setChecked]=useState({});
  const [aiItems,setAiItems]=useState([]);
  const [aiLoading,setAiLoading]=useState(false);
  const caseType=pt.caseType||"";
  const baseItems=(OR_CHECKLISTS[caseType]||[]).map((t,i)=>({id:"base-"+i,text:t}));
  const allItems=[...baseItems,...aiItems.map((t,i)=>({id:"ai-"+i,text:t,ai:true}))];
  const done=allItems.filter(x=>checked[x.id]).length;
  const tog=(id)=>setChecked(p=>({...p,[id]:!p[id]}));

  const generateAI=async()=>{
    setAiLoading(true);setAiItems([]);
    const prompt=`Generate 5-7 PATIENT-SPECIFIC OR setup items beyond the standard template. This patient: ${pt.name||"?"} | ${pt.ageSex||"?"} | ${pt.weight||"?"}kg | ${pt.procedure||"?"} (${caseType}) | PMHx: ${pt.pmhx||"None"} | Meds: ${pt.medications||"None"} | Allergies: ${pt.nkda?"NKDA":pt.allergies}. Return ONLY a JSON array of strings.`;
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":getApiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:600,messages:[{role:"user",content:prompt}]})});
      const data=await r.json();
      const text=(data.content||[]).map(c=>c.text||"").join("");
      const clean=text.replace(/```json|```/g,"").trim();
      const arr=JSON.parse(clean);
      if(Array.isArray(arr))setAiItems(arr);
    }catch(e){setAiItems(["Error: "+e.message]);}
    setAiLoading(false);
  };

  const progress=allItems.length>0?(done/allItems.length)*100:0;

  return(
    <div className="page">
      <div className="page-title">OR Setup Checklist</div>
      <div className="page-sub">// case-type template + AI patient-specific items</div>
      <div className="card gap">
        <div className="section-head">Case Type</div>
        <div className="pill-wrap">
          {CASE_TYPES.map(c=><span key={c} className={`pill${pt.caseType===c?" on":""}`}
            onClick={()=>setPt&&setPt(p=>({...p,caseType:c}))}>{c}</span>)}
        </div>
      </div>
      {caseType&&(
        <>
          <div className="card gap" style={{padding:"14px 20px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:8}}>
              <div style={{fontFamily:"var(--font-mono)",fontSize:12,color:"var(--text2)"}}>
                {done} / {allItems.length} complete
                {done===allItems.length&&allItems.length>0&&<span style={{color:"var(--green)",marginLeft:10}}>✓ READY</span>}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button className="btn btn-ghost" onClick={generateAI} disabled={aiLoading} style={{fontSize:11,padding:"6px 12px"}}>
                  {aiLoading?<span className="dot-stream">Generating</span>:"✦ Patient-Specific Items"}
                </button>
                <button className="btn btn-ghost" onClick={()=>setChecked({})} style={{fontSize:11,padding:"6px 12px"}}>Reset</button>
              </div>
            </div>
            <div className="risk-bar-wrap" style={{height:8}}>
              <div className="risk-bar" style={{width:`${progress}%`,background:progress===100?"var(--green)":"var(--cyan)"}}/>
            </div>
          </div>
          <div className="or-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div>
              <div className="section-head" style={{marginBottom:12}}>Template: {caseType}</div>
              {baseItems.map(item=>(
                <div key={item.id} className={`check-item${checked[item.id]?" done":""}`} onClick={()=>tog(item.id)}>
                  <div className="check-box">{checked[item.id]&&"✓"}</div>
                  <div className="check-txt">{item.text}</div>
                </div>
              ))}
            </div>
            <div>
              <div className="section-head" style={{marginBottom:12}}>Patient-Specific</div>
              {aiItems.length===0&&!aiLoading&&(
                <div style={{padding:"24px 0",textAlign:"center",color:"var(--text3)",fontFamily:"var(--font-mono)",fontSize:11}}>Click "Patient-Specific Items" to generate AI checklist</div>
              )}
              {aiItems.map((item,i)=>{
                const id="ai-"+i;
                return(
                  <div key={id} className={`check-item${checked[id]?" done":""}`} onClick={()=>tog(id)}>
                    <div className="check-box">{checked[id]&&"✓"}</div>
                    <div><div className="check-txt">{item}</div><div className="check-priority" style={{color:"var(--cyan)"}}>✦ patient-specific</div></div>
                  </div>
                );
              })}
            </div>
          </div>
          {/* Regional blocks */}
          {(REGIONAL_BY_CASE[caseType]||[]).length>0&&(
            <div className="card" style={{marginTop:16}}>
              <div className="section-head">Regional Anesthesia Options for {caseType}</div>
              {(REGIONAL_BY_CASE[caseType]||[]).map((b,i)=>(
                <div key={i} style={{padding:"10px 0",borderBottom:i<(REGIONAL_BY_CASE[caseType]||[]).length-1?"1px solid var(--border)":"none"}}>
                  <div style={{fontWeight:600,fontSize:13,color:"var(--text)",marginBottom:3}}>{b.name}</div>
                  <div style={{fontSize:12,color:"var(--text2)",marginBottom:3}}>{b.desc}</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--cyan)"}}>{b.la}</span>
                    <span style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text3)"}}>Timing: {b.timing}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ─── PLAN SECTION COMPONENT ─────────────────────────────────────────────────
function PlanSection({label,items,pt,sp}){
  const [open,setOpen]=useState(true);
  const [expanded,setExpanded]=useState({});
  const getId=(o)=>typeof o==="object"?o.id:o;
  const getLabel=(o)=>typeof o==="object"?o.label:o;
  const getBrand=(o)=>typeof o==="object"&&o.brand&&o.brand!=="—"?o.brand:null;
  const getMoa=(o)=>typeof o==="object"?o.moa:null;
  return(
    <div style={{marginBottom:14}}>
      <div className="section-head" style={{cursor:"pointer",userSelect:"none"}} onClick={()=>setOpen(o=>!o)}>
        {label}<span style={{marginLeft:"auto",marginRight:0,fontSize:10,color:"var(--text3)",fontFamily:"var(--font-mono)",letterSpacing:0}}>{open?"▾":"▸"}</span>
      </div>
      {open&&items.map(({key,lbl})=>{
        const phase=PHASES[key];if(!phase)return null;
        const common=phase.common||[],advanced=phase.advanced||[];
        const isSingle=!!phase.single;
        const sel=pt[key]||[];
        const showAdv=expanded[key];
        const hasAdvSel=advanced.some(o=>sel.includes(getId(o)));
        const toggle=(opt)=>{const id=getId(opt);if(isSingle){sp(key)(sel.includes(id)?[]:[id]);}else{sp(key)(sel.includes(id)?sel.filter(x=>x!==id):[...sel,id]);}};
        const renderPill=(o,isAdv=false)=>{
          const id=getId(o),lbl2=getLabel(o),brand=getBrand(o),moa=getMoa(o),on=sel.includes(id);
          return(<div key={id} onClick={()=>toggle(o)}
            style={{display:"inline-flex",flexDirection:"column",padding:"5px 10px",borderRadius:"var(--r)",
              border:`1px solid ${on?"var(--cyan)":isAdv?"rgba(255,255,255,0.12)":"rgba(255,255,255,0.14)"}`,
              background:on?"rgba(0,212,255,0.12)":isAdv?"rgba(255,255,255,0.02)":"rgba(255,255,255,0.03)",
              cursor:"pointer",transition:"all 0.15s",borderStyle:isAdv&&!on?"dashed":"solid",marginBottom:4,marginRight:4}}>
            <span style={{fontSize:12,fontWeight:600,color:on?"var(--cyan)":"var(--text)",fontFamily:"var(--font-body)",whiteSpace:"nowrap"}}>{lbl2}</span>
            {(brand||moa)&&<span style={{fontSize:9.5,color:on?"rgba(0,212,255,0.7)":"var(--text3)",fontFamily:"var(--font-mono)",marginTop:1,lineHeight:1.3,whiteSpace:"nowrap"}}>{[brand,moa].filter(Boolean).join(" · ")}</span>}
          </div>);
        };
        return(<div key={key} style={{marginBottom:10}}>
          <label className="field-lbl">{lbl}</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:0}}>
            {common.map(o=>renderPill(o,false))}
            {advanced.length>0&&(<>
              {showAdv&&advanced.map(o=>renderPill(o,true))}
              <span onClick={()=>setExpanded(p=>({...p,[key]:!p[key]}))}
                style={{display:"inline-flex",alignItems:"center",padding:"5px 10px",borderRadius:"var(--r)",fontSize:11,fontWeight:500,
                  border:`1px dashed ${hasAdvSel&&!showAdv?"var(--amber)":"rgba(255,255,255,0.18)"}`,
                  background:hasAdvSel&&!showAdv?"var(--amber2)":"rgba(255,255,255,0.02)",
                  cursor:"pointer",color:hasAdvSel&&!showAdv?"var(--amber)":"var(--text3)",
                  fontFamily:"var(--font-mono)",userSelect:"none",transition:"all 0.15s",marginBottom:4}}>
                {showAdv?"− less":`+ ${advanced.length} more${hasAdvSel?" ●":""}`}
              </span>
            </>)}
          </div>
        </div>);
      })}
    </div>
  );
}

// ─── PRE-OP PLANNER ──────────────────────────────────────────────────────────
function PreOpPlanner({pt,setPt}){
  const [output,setOutput]=useState("");
  const [loading,setLoading]=useState(false);
  const [streaming,setStreaming]=useState(false);
  const [copied,setCopied]=useState(false);
  const [view,setView]=useState("plan");
  const [chkd,setChkd]=useState([]);
  const s=(k,v)=>setPt(p=>({...p,[k]:v}));
  const sp=(k)=>(v)=>setPt(p=>({...p,[k]:v}));

  const checklistItems=output?output.split("\n").filter(l=>l.trim().match(/^[-•*]|^\d+\./)).map(l=>l.replace(/^[-•*]\s*|\d+\.\s*/,"")):[];
  const togChk=(i)=>setChkd(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i]);

  const resolveIds=(ids,phaseKey)=>{
    const phase=PHASES[phaseKey];if(!phase)return(ids||[]).join(", ");
    const allDrugs=[...(phase.common||[]),...(phase.advanced||[])];
    return(ids||[]).map(id=>{const d=allDrugs.find(o=>(typeof o==="object"?o.id:o)===id);if(!d)return id;if(typeof d==="string")return d;const brand=d.brand&&d.brand!=="—"?` (${d.brand})`:"";return `${d.label}${brand}`;}).join(", ")||"None";
  };

  const buildPrompt=()=>{
    const regionalBlocks=(pt.regionalBlocks||[]);
    const regionalSection=pt.regionalMode&&regionalBlocks.length>0
      ?`\nREGIONAL ANESTHESIA PLAN:\n${regionalBlocks.map(b=>{const info=(REGIONAL_BY_CASE[pt.caseType]||[]).find(x=>x.name===b);return info?`  • ${b}: ${info.la} — ${info.timing} (${info.desc})`:`  • ${b}`;}).join("\n")}`
      :pt.regionalMode?"\nREGIONAL MODE ON — no blocks selected yet; suggest appropriate blocks"
      :"";
    const opioidSection=pt.opioidSparing?`\nOPIOID-SPARING STRATEGY REQUESTED: Minimize/eliminate intraoperative and postoperative opioids. Prioritize multimodal analgesia: regional, NSAIDs, acetaminophen, ketamine, lidocaine infusion, dexmedetomidine.`:"";
    return `You are an expert attending anesthesiologist. Write a concise, clinically precise pre-operative anesthesia plan for a CA1 resident. Use standard abbreviations. Real attending voice.

PATIENT: ${pt.name||"Unknown"} | ${pt.ageSex||"?"} | Wt:${pt.weight||"?"}kg | Ht:${pt.height||"?"}cm
NKDA: ${pt.nkda?"Yes":"No — Allergies: "+(pt.allergies||"?")} | Smoker: ${pt.smoker?"Yes":"No"}
PROCEDURE: ${pt.procedure||"?"} — Indication: ${pt.indication||"?"}
PMHx: ${pt.pmhx||"None"} | Meds: ${pt.medications||"None"}
Prior Anesthesia: ${pt.priorAnesthesia||"None"} | Labs: ${pt.labs||"Pending"}
ASA: ${pt.asa||"?"} | Mallampati: ${pt.mallampati||"?"} | METs: ${pt.mets||"?"}
${regionalSection}${opioidSection}

PLANNED:
Pre-op: Premed: ${resolveIds(pt.premed,"premed")} | Labs: ${resolveIds(pt.labsNeeded,"labs")} | Access: ${resolveIds(pt.access,"access")} | ABx: ${resolveIds(pt.abx,"abx")}
Intraop: Type: ${resolveIds(pt.anesthType,"anesthType")} | Airway: ${resolveIds(pt.airway,"airway")} via ${resolveIds(pt.device,"device")} | Induction: ${resolveIds(pt.induction,"induction")} | Paralytic: ${resolveIds(pt.paralytic,"paralytic")} | Maintenance: ${resolveIds(pt.maintenance,"maintenance")} | Adjuncts: ${resolveIds(pt.adjuncts,"adjuncts")} | Monitors: ${resolveIds(pt.monitors,"monitors")} | Reversal: ${resolveIds(pt.reversal,"reversal")} | Antiemetics: ${resolveIds(pt.antiemetic,"antiemetic")}
Post-op: Disposition: ${resolveIds(pt.disposition,"disposition")} | PACU: ${resolveIds(pt.pacuOrders,"pacuOrders")}
Notes: ${pt.notes||"None"}

Write in these sections:
1. PATIENT SUMMARY
2. AIRWAY ASSESSMENT & PLAN
3. PREOPERATIVE PHASE${pt.regionalMode?" (include regional block prep, consent, ultrasound/nerve stimulator setup)":""}
4. INTRAOPERATIVE PHASE${pt.opioidSparing?" (detail opioid-sparing multimodal regimen explicitly)":""}
5. POSTOPERATIVE PHASE
6. KEY CONCERNS / SPECIAL CONSIDERATIONS
Be terse, clinical, and direct.`;
  };

  const generate=async()=>{
    setLoading(true);setOutput("");setStreaming(true);setView("plan");
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":getApiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1400,stream:true,messages:[{role:"user",content:buildPrompt()}]})});
      const reader=r.body.getReader();const dec=new TextDecoder();let buf="";
      while(true){const{done,value}=await reader.read();if(done)break;
        buf+=dec.decode(value,{stream:true});const lines=buf.split("\n");buf=lines.pop();
        for(const l of lines){if(!l.startsWith("data: "))continue;const d=l.slice(6);if(d==="[DONE]")continue;
          try{const j=JSON.parse(d);if(j.delta?.text)setOutput(p=>p+j.delta.text);}catch{}}}
    }catch(e){setOutput("Error: "+e.message);}
    setLoading(false);setStreaming(false);
  };

  return(
    <div className="page">
      <div className="page-title">Pre-Op Planner</div>
      <div className="page-sub">// patient data · anesthesia plan · AI generation</div>
      <div className="preop-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
        {/* LEFT: form */}
        <div>
          {/* Patient info */}
          <div className="card gap" style={{marginBottom:16}}>
            <div className="section-head">Patient Info</div>
            <div className="g2 gap"><div><label className="field-lbl">Name</label><input placeholder="Last, First" value={pt.name} onChange={e=>s("name",e.target.value)}/></div>
              <div><label className="field-lbl">Age / Sex</label><input placeholder="45M, 32F…" value={pt.ageSex} onChange={e=>s("ageSex",e.target.value)}/></div></div>
            <div className="g2 gap"><div><label className="field-lbl">Weight (kg)</label><input type="number" placeholder="70" value={pt.weight} onChange={e=>s("weight",e.target.value)}/></div>
              <div><label className="field-lbl">Height (cm)</label><input type="number" placeholder="170" value={pt.height} onChange={e=>s("height",e.target.value)}/></div></div>
            <div className="gap">
              <div className="toggle-row gap"><span className="toggle-lbl">NKDA</span><div className={`tog${pt.nkda?" on":""}`} onClick={()=>s("nkda",!pt.nkda)}/></div>
              {!pt.nkda&&<textarea placeholder="Allergies & reactions…" value={pt.allergies} onChange={e=>s("allergies",e.target.value)} style={{minHeight:44,marginTop:6}}/>}
            </div>
            <div className="toggle-row"><span className="toggle-lbl">Active Smoker</span><div className={`tog${pt.smoker?" on":""}`} onClick={()=>s("smoker",!pt.smoker)}/></div>
          </div>

          {/* Case info */}
          <div className="card gap" style={{marginBottom:16}}>
            <div className="section-head">Case</div>
            <div className="gap"><label className="field-lbl">Case Type</label>
              <select value={pt.caseType} onChange={e=>{const ct=e.target.value;const def=CASE_DEFAULTS[ct]||{};setPt(p=>({...p,caseType:ct,...def}));}}>
                <option value="">Select case type…</option>{CASE_TYPES.map(c=><option key={c} value={c}>{c}</option>)}
              </select></div>
            <div className="gap"><label className="field-lbl">Procedure</label><input placeholder="Laparoscopic cholecystectomy…" value={pt.procedure} onChange={e=>s("procedure",e.target.value)}/></div>
            <div className="gap"><label className="field-lbl">Indication</label><input placeholder="Acute cholecystitis…" value={pt.indication} onChange={e=>s("indication",e.target.value)}/></div>
          </div>

          {/* Clinical */}
          <div className="card gap" style={{marginBottom:16}}>
            <div className="section-head">Clinical Details</div>
            <div className="g2 gap"><div><label className="field-lbl">ASA Class</label>
              <select value={pt.asa} onChange={e=>s("asa",e.target.value)}><option value="">—</option>{["I","II","III","IV","V","VI"].map(x=><option key={x}>{x}</option>)}</select></div>
              <div><label className="field-lbl">Mallampati</label>
              <select value={pt.mallampati} onChange={e=>s("mallampati",e.target.value)}><option value="">—</option>{["I","II","III","IV"].map(x=><option key={x}>{x}</option>)}</select></div></div>
            <div className="gap"><label className="field-lbl">Functional Capacity (METs)</label>
              <select value={pt.mets} onChange={e=>s("mets",e.target.value)}><option value="">—</option><option value="<4">&lt;4 METs (poor)</option><option value="4-7">4-7 METs (moderate)</option><option value=">7">&gt;7 METs (good)</option></select></div>
            <div className="gap"><label className="field-lbl">PMHx / Comorbidities</label><textarea placeholder="HTN, DM2, OSA on CPAP, CAD s/p CABG…" value={pt.pmhx} onChange={e=>s("pmhx",e.target.value)}/></div>
            <div className="gap"><label className="field-lbl">Current Medications</label><textarea placeholder="Metoprolol 25mg daily, Lisinopril…" value={pt.medications} onChange={e=>s("medications",e.target.value)}/></div>
            <div className="gap"><label className="field-lbl">Prior Anesthesia / Issues</label><input placeholder="Difficult intubation 2019, PONV…" value={pt.priorAnesthesia} onChange={e=>s("priorAnesthesia",e.target.value)}/></div>
            <div className="gap"><label className="field-lbl">Labs / Vitals</label><input placeholder="Na 138, K 4.1, Cr 1.0, Hgb 12, INR 1.0; HR 72, BP 130/80" value={pt.labs} onChange={e=>s("labs",e.target.value)}/></div>
          </div>

          {/* Anesthesia plan */}
          <div className="card gap" style={{marginBottom:16}}>
            <div className="section-head">Anesthesia Plan</div>
            <div style={{display:"flex",gap:16,marginBottom:10,flexWrap:"wrap"}}>
              <div className="toggle-row" style={{gap:8}}><span className="toggle-lbl" style={{fontSize:11}}>Regional Mode</span><div className={`tog${pt.regionalMode?" on":""}`} onClick={()=>s("regionalMode",!pt.regionalMode)}/></div>
              <div className="toggle-row" style={{gap:8}}><span className="toggle-lbl" style={{fontSize:11}}>Opioid-Sparing</span><div className={`tog${pt.opioidSparing?" on":""}`} onClick={()=>s("opioidSparing",!pt.opioidSparing)}/></div>
            </div>
            {pt.regionalMode&&(REGIONAL_BY_CASE[pt.caseType]||[]).length>0&&(
              <div style={{marginBottom:10}}>
                <label className="field-lbl">Regional Blocks</label>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {(REGIONAL_BY_CASE[pt.caseType]||[]).map(b=>{
                    const on=(pt.regionalBlocks||[]).includes(b.name);
                    return(<div key={b.name} onClick={()=>{const cur=pt.regionalBlocks||[];s("regionalBlocks",on?cur.filter(x=>x!==b.name):[...cur,b.name]);}}
                      style={{padding:"6px 10px",borderRadius:"var(--r)",border:`1px solid ${on?"var(--purple)":"var(--border2)"}`,background:on?"var(--purple2)":"rgba(255,255,255,0.02)",cursor:"pointer",marginBottom:4}}>
                      <div style={{fontSize:12,color:on?"var(--purple)":"var(--text)",fontWeight:600}}>{b.name}</div>
                      <div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--font-mono)"}}>{b.la}</div>
                    </div>);
                  })}
                </div>
              </div>
            )}
            <PlanSection label="Pre-operative" items={[{key:"premed",lbl:"Premedication"},{key:"labsNeeded",lbl:"Labs Needed"},{key:"access",lbl:"Vascular Access"},{key:"abx",lbl:"Antibiotic Prophylaxis"}]} pt={pt} sp={sp}/>
            <PlanSection label="Intraoperative" items={[{key:"anesthType",lbl:"Anesthesia Type"},{key:"airway",lbl:"Airway Device"},{key:"device",lbl:"Intubation Device"},{key:"induction",lbl:"Induction Agents"},{key:"paralytic",lbl:"Neuromuscular Blockade"},{key:"maintenance",lbl:"Maintenance"},{key:"adjuncts",lbl:"Adjuncts / Analgesia"},{key:"monitors",lbl:"Special Monitors"}]} pt={pt} sp={sp}/>
            <PlanSection label="Post-operative" items={[{key:"reversal",lbl:"Reversal"},{key:"antiemetic",lbl:"Antiemetics"},{key:"disposition",lbl:"Disposition"},{key:"pacuOrders",lbl:"PACU Orders"}]} pt={pt} sp={sp}/>
            <div style={{marginBottom:16}}><label className="field-lbl">Notes / Special Considerations</label><textarea style={{minHeight:56}} placeholder="Positioning concerns, surgeon requests, special equipment…" value={pt.notes} onChange={e=>s("notes",e.target.value)}/></div>
            <button className="btn btn-primary" onClick={generate} disabled={loading} style={{width:"100%",padding:"13px"}}>
              {loading?<><span className="dot-stream">Generating plan</span></>:"✦ Generate Pre-Op Plan"}
            </button>
          </div>
        </div>

        {/* RIGHT: output */}
        <div style={{overflowY:"auto"}}>
          {!output&&!loading&&(
            <div style={{height:"50vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"var(--text3)",gap:10}}>
              <div style={{fontSize:48,opacity:0.2}}>📋</div>
              <div style={{fontFamily:"var(--font-mono)",fontSize:13}}>Select case type → adjust → generate</div>
              <div style={{fontSize:11,color:"var(--text3)"}}>Defaults auto-fill when you pick a case type</div>
            </div>
          )}
          {(output||loading)&&(<>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontFamily:"var(--font-head)",fontSize:17,fontWeight:700}}>{pt.name||"Patient"} — Pre-Op Plan</div>
                {pt.procedure&&<div style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text3)",marginTop:2}}>{pt.procedure}</div>}
              </div>
              {output&&<div style={{display:"flex",gap:6}}>
                <div style={{display:"flex",gap:3,background:"var(--bg1)",border:"1px solid var(--border)",borderRadius:"var(--r)",padding:"4px"}}>
                  {["plan","checklist"].map(t=><button key={t} className={`btn${view===t?" btn-primary":" btn-ghost"}`} style={{fontSize:11,padding:"5px 12px"}} onClick={()=>setView(t)}>{t}</button>)}
                </div>
                <button className="btn btn-ghost" onClick={()=>{navigator.clipboard.writeText(output);setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{fontSize:12}}>
                  {copied?"✓ Copied":"⎘ Copy"}
                </button>
              </div>}
            </div>
            {view==="plan"&&<div className="plan-out">{output.replace(/\*\*(.*?)\*\*/g,"$1").replace(/#{1,3}\s/g,"")}{streaming&&<span className="blink-cur"/>}</div>}
            {view==="checklist"&&!streaming&&(
              <div>{checklistItems.map((item,i)=>(
                <div key={i} className={`check-item${chkd.includes(i)?" done":""}`} onClick={()=>togChk(i)}>
                  <div className="check-box">{chkd.includes(i)&&"✓"}</div>
                  <div className="check-txt">{item}</div>
                </div>
              ))}</div>
            )}
          </>)}
        </div>
      </div>
    </div>
  );
}

// ─── READINGS TAB ────────────────────────────────────────────────────────────
function ReadingsTab({pt}){
  const [extraCases,setExtraCases]=useState([]);
  const [caseInput,setCaseInput]=useState("");
  const [activeBook,setActiveBook]=useState("mm");
  const [aiOutput,setAiOutput]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [aiStreaming,setAiStreaming]=useState(false);

  const allCases=[...new Set([...(pt.caseType?[pt.caseType]:[]),...extraCases])];

  const addCase=()=>{
    if(caseInput&&!extraCases.includes(caseInput)){setExtraCases(p=>[...p,caseInput]);}
    setCaseInput("");
  };

  const BOOK_INFO={
    mm:{label:"M&M",full:"Morgan & Mikhail's Clinical Anesthesiology",edition:"6th ed."},
    barash:{label:"Barash",full:"Barash's Clinical Anesthesia",edition:"9th ed."},
    jaffe:{label:"Jaffe AMSP",full:"Anesthesiologist's Manual of Surgical Procedures",edition:"6th ed."},
    toolbox:{label:"ASA Toolbox",full:"ASA Anesthesia Toolbox",edition:"Online"},
  };

  const getChapters=(book)=>{
    if(book==="toolbox")return[];
    const result=[],seen=new Set();
    const add=(ch,src)=>{const key=ch.ch||ch.title;if(!seen.has(key)){seen.add(key);result.push({...ch,src});}};
    (RDB.core?.[book]||[]).forEach(ch=>add(ch,"Foundation"));
    allCases.forEach(ct=>{(RDB[ct]?.[book]||[]).forEach(ch=>add(ch,ct));});
    // comorbidity triggers
    const pmhx=(pt.pmhx||"").toLowerCase()+(" "+(pt.medications||"")).toLowerCase();
    const checks=[
      {re:/cardiac|heart failure|chf|cad|mi\b|coronary|angina|valve|ef\b|af\b/,key:"cardiac",lbl:"Cardiac comorbidity"},
      {re:/renal|kidney|ckd|esrd|dialysis|creatinine/,key:"renal",lbl:"Renal comorbidity"},
      {re:/hepat|liver|cirrhosis|fibrosis|esld|ascites/,key:"hepatic",lbl:"Hepatic comorbidity"},
      {re:/copd|asthma|emphys|pulmon|bronchi|obstructive/,key:"pulmonary",lbl:"Pulmonary comorbidity"},
      {re:/diabet|dm\b|insulin|a1c|glucose/,key:"endocrine",lbl:"Endocrine comorbidity"},
      {re:/epilepsy|seizure|parkinson|myasthenia|ams|dementia/,key:"neurologic",lbl:"Neurologic comorbidity"},
      {re:/coagulop|bleeding|plt|hemophilia|warfarin|coumadin|eliquis|xarelto|plavix/,key:"coagulopathy",lbl:"Coagulation concern"},
      {re:/obes|bmi|bariatric|morbid/,key:"obesity",lbl:"Obesity"},
    ];
    checks.forEach(({re,key,lbl})=>{if(re.test(pmhx))(COMORBIDITY_DB[key]?.[book]||[]).forEach(ch=>add(ch,lbl));});
    return result.sort((a,b)=>({high:0,med:1,low:2}[a.yield]||1)-({high:0,med:1,low:2}[b.yield]||1));
  };

  const getBoardTopics=()=>{
    const out=[];
    allCases.forEach(ct=>{(RDB[ct]?.boards||[]).forEach(t=>out.push({topic:t,case:ct}));});
    return out;
  };

  const generateAI=async()=>{
    setAiLoading(true);setAiOutput("");setAiStreaming(true);
    const chapters=getChapters(activeBook);
    const boardTopics=getBoardTopics();
    const prompt=`You are a senior anesthesiologist helping a CA1 resident prep for boards and tomorrow's cases. Generate a HIGH-YIELD, ABA BASIC EXAM-FOCUSED study guide.

TODAY'S CASES: ${allCases.join(", ")||"General"}
PATIENT: ${pt.name||"Unknown"} | ${pt.ageSex||"?"} | PMHx: ${pt.pmhx||"None"} | Meds: ${pt.medications||"None"}
PROCEDURE: ${pt.procedure||"TBD"} | ASA: ${pt.asa||"?"}

KEY BOARD TOPICS FOR TODAY'S CASES:
${boardTopics.map(t=>`- ${t.topic} [${t.case}]`).join("\n")||"- General anesthesia principles"}

For EACH case type today, generate:
1. TOP 5-7 HIGH-YIELD CONCEPTS (board-style, what's most commonly tested)
2. Key numbers/formulas to know cold
3. One CLASSIC BOARD SCENARIO per case (brief setup + teaching point)
4. Comorbidity-specific anesthetic implications for THIS patient
5. "DON'T MISS" list: 3-4 critical items for tomorrow

Be concise, exam-focused. Format with clear headers. Target ABA BASIC exam level.`;
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":getApiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1800,stream:true,messages:[{role:"user",content:prompt}]})});
      const reader=r.body.getReader();const dec=new TextDecoder();let buf="";
      while(true){const{done,value}=await reader.read();if(done)break;
        buf+=dec.decode(value,{stream:true});const lines=buf.split("\n");buf=lines.pop();
        for(const l of lines){if(!l.startsWith("data: "))continue;const d=l.slice(6);if(d==="[DONE]")continue;
          try{const j=JSON.parse(d);if(j.delta?.text)setAiOutput(p=>p+j.delta.text);}catch{}}}
    }catch(e){setAiOutput("Error: "+e.message);}
    setAiLoading(false);setAiStreaming(false);
  };

  const yieldInfo=(y)=>y==="high"?{icon:"⭐",label:"High Yield",color:"var(--cyan)"}:y==="med"?{icon:"◉",label:"Med Yield",color:"var(--amber)"}:{icon:"◯",label:"Background",color:"var(--text3)"};
  const chapters=getChapters(activeBook);
  const boardTopics=getBoardTopics();
  const toolboxItems=allCases.flatMap(ct=>(RDB[ct]?.toolbox||[]).map(t=>({...t,case:ct})));

  return(
    <div className="page">
      <div className="page-title">Reading Recommendations</div>
      <div className="page-sub">// textbook chapters · board exam focus · AI study guide</div>

      {/* Today's Cases */}
      <div className="card gap" style={{marginBottom:16}}>
        <div className="section-head">Today's Cases</div>
        {allCases.length===0&&<div style={{color:"var(--text3)",fontFamily:"var(--font-mono)",fontSize:12,marginBottom:10}}>No cases loaded — set case type in Pre-Op Planner or add cases below</div>}
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
          {allCases.map(c=>(
            <span key={c} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 12px",background:"var(--cyan2)",border:"1px solid var(--cyan)",borderRadius:"var(--r)",fontSize:12,color:"var(--cyan)",fontFamily:"var(--font-mono)"}}>
              {c}
              {c===pt.caseType?<span style={{fontSize:9,opacity:0.6}}>auto</span>:<span onClick={()=>setExtraCases(p=>p.filter(x=>x!==c))} style={{cursor:"pointer",opacity:0.7,fontSize:14,lineHeight:1}}>×</span>}
            </span>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <select value={caseInput} onChange={e=>setCaseInput(e.target.value)} style={{flex:1}}>
            <option value="">+ Add another case for today…</option>
            {CASE_TYPES.filter(c=>!allCases.includes(c)).map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <button className="btn btn-ghost" onClick={addCase} disabled={!caseInput} style={{fontSize:12,padding:"8px 16px",flexShrink:0}}>Add</button>
        </div>
      </div>

      {/* Board Exam Topics */}
      {boardTopics.length>0&&(
        <div className="card gap" style={{marginBottom:16,background:"rgba(0,212,255,0.02)",borderColor:"rgba(0,212,255,0.2)"}}>
          <div className="section-head">ABA Board Focus — Today's Cases</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {boardTopics.map((t,i)=>(
              <span key={i} style={{padding:"4px 10px",border:"1px solid rgba(0,212,255,0.2)",borderRadius:20,fontSize:11,color:"var(--text2)",fontFamily:"var(--font-mono)",background:"rgba(0,212,255,0.04)"}}>
                {t.topic}
              </span>
            ))}
          </div>
        </div>
      )}

      {/* Book selector */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
        {Object.entries(BOOK_INFO).map(([id,b])=>(
          <button key={id} onClick={()=>setActiveBook(id)} className={`btn ${activeBook===id?"btn-primary":"btn-ghost"}`} style={{fontSize:12,padding:"8px 18px"}}>{b.label}</button>
        ))}
      </div>

      {/* Book header */}
      <div style={{marginBottom:16}}>
        <div style={{fontFamily:"var(--font-head)",fontSize:15,fontWeight:700}}>{BOOK_INFO[activeBook]?.full}</div>
        <div style={{fontFamily:"var(--font-mono)",fontSize:10,color:"var(--text3)",marginTop:2}}>
          {BOOK_INFO[activeBook]?.edition}
          {activeBook!=="toolbox"&&` · ${chapters.length} chapter${chapters.length!==1?"s":""} recommended`}
        </div>
      </div>

      {/* ASA Toolbox special view */}
      {activeBook==="toolbox"&&(
        <div className="card" style={{textAlign:"center",padding:32}}>
          <div style={{fontSize:40,marginBottom:12}}>🔗</div>
          <div style={{fontFamily:"var(--font-head)",fontSize:17,fontWeight:700,marginBottom:8}}>ASA Anesthesia Toolbox</div>
          <div style={{color:"var(--text2)",fontSize:13,marginBottom:20,lineHeight:1.7}}>Free clinical reference resources for anesthesiologists.<br/>Access through your ASA member account.</div>
          {toolboxItems.length>0&&(<>
            <div style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text3)",marginBottom:12}}>Recommended Toolbox searches for today's cases:</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginBottom:24}}>
              {toolboxItems.map((t,i)=>(
                <div key={i} style={{padding:"8px 14px",background:"var(--cyan2)",border:"1px solid rgba(0,212,255,0.3)",borderRadius:"var(--r)",fontSize:12,color:"var(--cyan)",fontFamily:"var(--font-mono)",textAlign:"left"}}>
                  <div style={{fontWeight:600}}>{t.title}</div>
                  <div style={{fontSize:10,opacity:0.7,marginTop:2}}>{t.tag}</div>
                </div>
              ))}
            </div>
          </>)}
          <a href="https://www.asahq.org/education-and-career/learning-education/toolbox" target="_blank" rel="noreferrer"
            style={{display:"inline-flex",alignItems:"center",gap:8,padding:"11px 28px",background:"linear-gradient(135deg,var(--cyan),#4f46e5)",borderRadius:"var(--r)",color:"white",fontSize:14,fontWeight:600,textDecoration:"none"}}>
            Open ASA Toolbox →
          </a>
        </div>
      )}

      {/* Chapter cards */}
      {activeBook!=="toolbox"&&(<>
        {chapters.length===0&&allCases.length===0&&(
          <div className="card" style={{textAlign:"center",padding:40}}>
            <div style={{fontSize:32,marginBottom:8,opacity:0.3}}>📚</div>
            <div style={{color:"var(--text3)",fontFamily:"var(--font-mono)",fontSize:12}}>Add cases above to get personalized chapter recommendations</div>
          </div>
        )}
        {chapters.length===0&&allCases.length>0&&(
          <div className="card" style={{textAlign:"center",padding:32}}>
            <div style={{color:"var(--text3)",fontFamily:"var(--font-mono)",fontSize:12}}>No chapters mapped for these cases in this book yet.</div>
          </div>
        )}
        {chapters.map((ch,i)=>{
          const yi=yieldInfo(ch.yield);
          return(
            <div key={i} className={`reading-card ${ch.yield}`}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:6}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:6,marginBottom:5}}>
                    <span className="ch-badge">{ch.ch}</span>
                    <span style={{fontFamily:"var(--font-head)",fontSize:14,fontWeight:700,color:"var(--text)"}}>{ch.title}</span>
                  </div>
                  {ch.why&&<div style={{fontSize:12,color:"var(--text2)",lineHeight:1.55}}>{ch.why}</div>}
                </div>
                <span style={{fontFamily:"var(--font-mono)",fontSize:10,color:yi.color,flexShrink:0,marginTop:2,whiteSpace:"nowrap"}}>{yi.icon} {yi.label}</span>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:8}}>
                <span className="source-tag">📌 {ch.src}</span>
                {(ch.board||[]).map((b,bi)=><span key={bi} className="board-tag">{b}</span>)}
              </div>
            </div>
          );
        })}
      </>)}

      {/* AI Study Guide */}
      {allCases.length>0&&(
        <div className="card" style={{marginTop:20,borderColor:"rgba(167,139,250,0.25)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:10}}>
            <div>
              <div className="section-head" style={{marginBottom:2}}>AI Board-Focused Study Guide</div>
              <div style={{fontFamily:"var(--font-mono)",fontSize:10,color:"var(--text3)"}}>ABA BASIC exam focus · tailored to today's cases + patient comorbidities</div>
            </div>
            <button className="btn btn-primary" onClick={generateAI} disabled={aiLoading} style={{fontSize:12,padding:"9px 18px",flexShrink:0,background:"linear-gradient(135deg,var(--purple),#4f46e5)"}}>
              {aiLoading?<span className="dot-stream">Generating</span>:"📖 Generate Study Guide"}
            </button>
          </div>
          {!aiOutput&&!aiLoading&&(
            <div style={{textAlign:"center",padding:"28px 0",color:"var(--text3)",fontFamily:"var(--font-mono)",fontSize:11,lineHeight:1.7}}>
              Click to generate board-focused notes tailored to today's cases<br/>
              <span style={{fontSize:10,opacity:0.6}}>Includes classic board scenarios + key numbers + don't-miss items</span>
            </div>
          )}
          {(aiOutput||aiLoading)&&(
            <div className="plan-out" style={{fontSize:12.5}}>
              {aiOutput.replace(/\*\*(.*?)\*\*/g,"$1").replace(/#{1,3}\s/g,"")}
              {aiStreaming&&<span className="blink-cur"/>}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── ROOT APP ────────────────────────────────────────────────────────────────
const TABS=[
  {id:"preop",label:"Pre-Op",icon:"📋"},
  {id:"risk",label:"Risk",icon:"⚡"},
  {id:"drugs",label:"Drugs",icon:"💊"},
  {id:"setup",label:"OR Setup",icon:"🏥"},
  {id:"readings",label:"Readings",icon:"📚"},
];

function App(){
  const [tab,setTab]=useState("preop");
  const [pt,setPt]=useState(defaultPt);

  const tabClick=(id)=>{setTab(id);window.scrollTo(0,0);};

  return(
    <>
      <style>{FONTS}{CSS}</style>
      <div className="app">
        {/* ── DESKTOP TOP NAV ── */}
        <nav className="nav">
          <div className="nav-logo">
            <div className="nav-logo-icon">🫁</div>
            <div><h1>AnesFlow</h1><span>CA1 Workflow Suite</span></div>
          </div>
          <div className="nav-tabs">
            {TABS.map(t=>(
              <button key={t.id} className={`nav-tab${tab===t.id?" active":""}`} onClick={()=>tabClick(t.id)}>
                <span className="nav-tab-icon">{t.icon}</span>{t.label}
                {t.id==="risk"&&pt.asa&&<span className="nav-badge">ASA {pt.asa}</span>}
                {t.id==="drugs"&&pt.weight&&<span className="nav-badge">{pt.weight}kg</span>}
                {t.id==="setup"&&pt.caseType&&<span className="nav-badge">{pt.caseType.split(" ")[0]}</span>}
                {t.id==="readings"&&pt.caseType&&<span className="nav-badge">{pt.caseType.split(" / ")[0].split(" ")[0]}</span>}
              </button>
            ))}
          </div>
          {pt.name&&(
            <div style={{padding:"8px 16px",borderLeft:"1px solid var(--border)",flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:"var(--cyan2)",border:"1px solid var(--cyan)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--font-mono)",fontSize:11,color:"var(--cyan)"}}>
                {pt.name[0]}
              </div>
              <div>
                <div style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text)"}}>{pt.name}</div>
                <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text3)"}}>{pt.procedure||"No procedure"}</div>
              </div>
            </div>
          )}
          <button onClick={()=>{localStorage.removeItem("anesflow_api_key");ANTHROPIC_API_KEY="";window.location.reload();}}
            title="Change API Key"
            style={{marginLeft:"auto",padding:"6px 12px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#4a5a7a",fontSize:10,cursor:"pointer",fontFamily:"monospace",flexShrink:0}}>
            🔑 API Key
          </button>
        </nav>

        {/* ── CONTENT ── */}
        <div className="content">
          {/* Patient context strip — mobile only */}
          {pt.name&&(
            <div style={{display:"none"}} className="mobile-pt-strip">
              <span style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--cyan)"}}>{pt.name}</span>
              {pt.caseType&&<span style={{fontFamily:"var(--font-mono)",fontSize:10,color:"var(--text3)",marginLeft:8}}>{pt.caseType}</span>}
            </div>
          )}
          {tab==="preop"&&<PreOpPlanner pt={pt} setPt={setPt}/>}
          {tab==="risk"&&<RiskStratifier pt={pt} setPt={setPt}/>}
          {tab==="drugs"&&<DrugCalc pt={pt}/>}
          {tab==="setup"&&<ORSetup pt={pt} setPt={setPt}/>}
          {tab==="readings"&&<ReadingsTab pt={pt}/>}
        </div>

        {/* ── MOBILE BOTTOM NAV ── */}
        <nav className="bottom-nav">
          <div className="bottom-nav-inner">
            {TABS.map(t=>(
              <button key={t.id} className={`bn-btn${tab===t.id?" active":""}`} onClick={()=>tabClick(t.id)}>
                <span className="bn-btn-icon">{t.icon}</span>
                <span>{t.label}</span>
                {t.id==="risk"&&pt.asa&&<span className="bn-badge">ASA{pt.asa}</span>}
                {t.id==="drugs"&&pt.weight&&<span className="bn-badge">{pt.weight}kg</span>}
              </button>
            ))}
          </div>
        </nav>
      </div>
    </>
  );
}

function AppWithKeyGate(){
  const [hasKey,setHasKey]=useState(!!localStorage.getItem("anesflow_api_key"));
  if(!hasKey)return <ApiKeyGate onSave={()=>setHasKey(true)}/>;
  return <App/>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(AppWithKeyGate));
